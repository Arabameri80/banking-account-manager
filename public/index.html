<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bank account</title>
    <link rel="icon" type="image/png" href="../public/img/logo.png" />
    <link rel="stylesheet" href="../dist/output.css" />
  </head>
  <body class="bg-White-Smoke font-Poppins">
    <svg class="hidden">
      <symbol
        id="arrow-long-right"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3"
        />
      </symbol>
    </svg>
    <!-- nav -->
    <nav class="nav">
      <div class="container flex items-center justify-between">
        <h1 class="text-[19px] text-gray-800">Log in to get started</h1>
        <!-- logo -->
        <img src="../public/img/logo.png" class="size-13" alt="logo" />
        <!-- log in -->
        <form class="flex gap-2.5" action="">
          <input
            id="log-in"
            class="w-30 h-9 py-1 px-5 bg-white rounded-[10rem] border-0 outline-0 transition-all text-center focus:ring-1 focus:ring-gray-400 placeholder:text-gray-300"
            type="text"
            placeholder="USER"
          />
          <input
            id="log-in"
            class="w-30 h-9 py-1 px-5 bg-white rounded-[10rem] border-0 outline-0 transition-all text-center focus:ring-1 focus:ring-gray-400 placeholder:text-gray-300"
            type="password"
            placeholder="PIN"
            maxlength="4"
          />
          <label for="log-in">
            <a href="">
              <svg class="w-5.5 h-9">
                <use xlink:href="#arrow-long-right"></use>
              </svg>
            </a>
          </label>
        </form>
      </div>
    </nav>
    <!-- main -->
    <main>
      <div class="container">
        <!-- header -->
        <div class="max-w-250 mx-auto mt-10">
          <header class="flex items-center justify-between">
            <div>
              <h2 class="text-2xl font-PoppinsMedium text-gray-800">
                Current balance
              </h2>
              <p class="text-[14px] text-gray-500">As of 05/03/2037</p>
            </div>
            <h2 class="sumOfmov text-5xl text-gray-700">3840€</h2>
          </header>
        </div>
        <!-- account -->
        <div
          class="grid grid-cols-[5fr_4fr] grid-rows-3 max-w-250 mx-auto mt-12 gap-8"
        >
          <!-- movements -->
          <div
            class="movements-container *:h-18 *:px-10 divide-y divide-gray-300 bg-white row-start-1 row-end-4 rounded-tl-xl overflow-scroll h-135"
          >
            <!-- deposit -->
            <div class="movement">
              <span class="deposit">7 deposit</span>
              <p class="text-[17px]">800€</p>
            </div>
            <!-- withdraw -->
            <div class="movement">
              <span class="withdraw">8 withdrawal</span>
              <p class="text-[17px]">-30€</p>
            </div>
          </div>
          <!-- transfer -->
          <div class="bg-linear-transfer px-10 py-7.5 rounded-xl">
            <div class="max-w-85">
              <h2 class="text-[17px] font-PoppinsSemiBold text-gray-800 mb-3.5">
                Transfer money
              </h2>
              <form
                class="grid grid-cols-3 grid-rows-2 gap-x-6 gap-y-1"
                action=""
              >
                <input
                  class="w-28.25 h-7 bg-white/40 rounded-[7px] border-0 outline-0 text-center focus:bg-white/60 text-[15px] text-gray-700"
                  type="number"
                />
                <input
                  class="w-28.25 h-7 bg-white/40 rounded-[7px] border-0 outline-0 text-center focus:bg-white/60 text-[15px] text-gray-700"
                  type="number"
                />
                <label
                  class="w-13.5 h-7 bg-white rounded-[7px] flex items-center justify-center cursor-pointer"
                  for=""
                >
                  <svg class="w-5.5 h-9 text-gray-800">
                    <use xlink:href="#arrow-long-right"></use>
                  </svg>
                </label>
                <span class="text-xs col-span-1 row-start-2 text-gray-800 pl-7"
                  >Transfer to</span
                >
                <span
                  class="text-xs col-start-2 col-end-3 row-start-2 text-gray-800 pl-8"
                  >Amount</span
                >
              </form>
            </div>
          </div>
          <!-- transfer -->
          <div class="bg-linear-deposit px-10 py-7.5 rounded-xl">
            <div class="max-w-85">
              <h2 class="text-[17px] font-PoppinsSemiBold text-gray-800 mb-3.5">
                Request loan
              </h2>
              <form class="grid grid-cols-3 gap-x-6 gap-y-1" action="">
                <input
                  class="w-28.25 h-7 bg-white/40 rounded-[7px] border-0 outline-0 text-center focus:bg-white/60 text-[15px] text-gray-700"
                  type="number"
                />
                <label
                  class="w-13.5 h-7 bg-white rounded-[7px] flex items-center justify-center cursor-pointer"
                  for=""
                >
                  <svg class="w-5.5 h-9 text-gray-800">
                    <use xlink:href="#arrow-long-right"></use>
                  </svg>
                </label>
                <span class="text-xs col-span-2 text-gray-800 pl-8"
                  >Amount</span
                >
              </form>
            </div>
          </div>
          <!-- transfer -->
          <div class="bg-linear-withdraw px-10 py-7.5 rounded-xl">
            <div class="max-w-85">
              <h2 class="text-[17px] font-PoppinsSemiBold text-gray-800 mb-3.5">
                Transfer money
              </h2>
              <form
                class="grid grid-cols-3 grid-rows-2 gap-x-6 gap-y-1"
                action=""
              >
                <input
                  class="w-28.25 h-7 bg-white/40 rounded-[7px] border-0 outline-0 text-center focus:bg-white/60 text-[15px] text-gray-700"
                  type="number"
                />
                <input
                  class="w-28.25 h-7 bg-white/40 rounded-[7px] border-0 outline-0 text-center focus:bg-white/60 text-[15px] text-gray-700"
                  type="number"
                />
                <label
                  class="w-13.5 h-7 bg-white rounded-[7px] flex items-center justify-center cursor-pointer"
                  for=""
                >
                  <svg class="w-5.5 h-9 text-gray-800">
                    <use xlink:href="#arrow-long-right"></use>
                  </svg>
                </label>
                <span class="text-xs col-span-1 row-start-2 text-gray-800 pl-7"
                  >Transfer to</span
                >
                <span
                  class="text-xs col-start-2 col-end-3 row-start-2 text-gray-800 pl-8"
                  >Amount</span
                >
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- footer -->
    <footer>
      <div class="container w-250 flex gap-8 items-center">
        <div class="flex gap-2 items-baseline">
          <p>In</p>
          <span class="text-2xl mr-6 text-green">16900€</span>
          <p>out</p>
          <span class="text-2xl mr-6 text-red">5180€</span>
          <p>Interest</p>
          <p class="text-2xl text-green">253.5€</p>
        </div>
        <p>↓ SORT</p>
        <div class="ml-43">You will be logged out in 05:00</div>
      </div>
    </footer>

    <!-- js -->
    <script src="../public/app.js"></script>
  </body>
</html>
